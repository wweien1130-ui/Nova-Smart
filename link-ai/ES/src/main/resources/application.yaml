server:
  port: 8088
  tomcat:
    uri-encoding: UTF-8
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: es-connector

  # Elasticsearch 配置
  elasticsearch:
    uris: http://192.168.115.128:19200

  # MySQL 数据源配置（hmall 数据库）
  datasource:
    url: jdbc:mysql://192.168.115.128:3307/hmall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 5000
      maximum-pool-size: 5

  # Spring AI 配置
  ai:
    # Chat 模型：本地 Ollama（gemma3:4b，响应快）
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: gemma3:4b
      embedding:
        options:
          model: qwen3-embedding:4b

logging:
  level:
    com.tianji: DEBUG
    org.elasticsearch: DEBUG

# linkai 数据库连接配置
linkai:
  datasource:
    url: jdbc:mysql://192.168.115.128:3307/linkai?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123
    driver-class-name: com.mysql.cj.jdbc.Driver
