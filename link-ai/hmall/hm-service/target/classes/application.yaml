server:
  port: 8080
  servlet:
    encoding:
      enabled: true
      force: true
      charset: utf-8
spring:
  application:
    name: hm-service
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://${hm.db.host}:3306/linkai?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${hm.db.pw}
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}  # 建议使用环境变量

    openai:
      api-key: ${DASHSCOPE_API_KEY}  # 建议使用环境变量



mybatis-plus:
  configuration:
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  global-config:
    db-config:
      update-strategy: not_null
      id-type: auto




logging:
  level:
    com.hmall: debug
  pattern:
    dateformat: HH:mm:ss:SSS
#  file:
#    path: "logs/${spring.application.name}"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  knife4j:
    setting:
      language: zh_CN

knife4j:
hm:
  jwt:
    location: classpath:hmall.jks
    alias: hmall
    password: hmall123
    tokenTTL: 30m
  auth:
    excludePaths:
      - /search/**
      - /users/login
      - /items/**
      - /hi
      - /v3/api-docs/**
      - /v2/api-docs/**
      - /doc.html
      - /swagger-ui/**
      - /swagger-resources/**
      - /knife4j/**
      - /webjars/**
      - /v2/**
      - /v3/**
      - /swagger-ui.html
      - /error
      - /favicon.ico
      - /**/swagger-ui/**
      - /**/swagger-resources
      - /**/v2/api-docs
      - /**/v3/api-docs
      - /**/doc.html
      - /**/knife4j/**
      - /webjars/**
# keytool -genkeypair -alias hmall -keyalg RSA -keypass hmall123 -keystore hmall.jks -storepass hmall123